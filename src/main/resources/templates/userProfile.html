<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль пользователя</title>
</head>
<body>

<h2 th:text="'Профиль: ' + ${user.firstName}">Профиль</h2>

<p>
    <b>Имя:</b> <span th:text="${user.firstName}">Имя</span><br>
    <b>Фамилия:</b> <span th:text="${user.lastName}">Фамилия</span><br>
    <b>Email:</b> <span th:text="${user.email}">Email</span><br>
    <b>Возраст:</b> <span th:text="${user.age}">0</span><br>
    <b>Роли:</b>
    <span th:each="role : ${user.roles}"
          th:if="${role.name.startsWith('ROLE_')}"
          th:text="${role.name.replace('ROLE_', '') + ' '}">USER</span>
</p>

<hr> <!-- Разделительная линия для визуального порядка -->

<!-- БЛОК ДЛЯ АДМИНА -->
<div sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/users/edit(id=${user.id})}">Редактировать пользователя</a>
    <br><br>

    <form th:action="@{/users/remove}" method="POST">
        <input type="hidden" name="id" th:value="${user.id}" />
        <button type="submit" onclick="return confirm('Вы уверены?')">
            Удалить пользователя
        </button>
    </form>
    <br>

    <a th:href="@{/users}">Назад ко всем пользователям</a>
    <br><br>
</div>

<!-- ВЫХОД (виден всем) -->
<form th:action="@{/logout}" method="POST">
    <button type="submit">Выйти из системы</button>
</form>

</body>
</html>
