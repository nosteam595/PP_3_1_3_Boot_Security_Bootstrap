<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список пользователей</title>
</head>
<body>

<h2>Таблица пользователей</h2>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя (Детали)</th>
        <th>Фамилия</th>
        <th>Почта</th>
        <th>Возраст</th>
        <th>Роли</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td>
            <a th:href="@{/users/user/details(id=${user.id})}" th:text="${user.firstName}">Иван</a>
        </td>
        <td th:text="${user.lastName}">Иванов</td>
        <td th:text="${user.email}">ivan@mail.com</td>
        <td th:text="${user.age}">25</td>
        <td>
                    <span th:each="role : ${user.roles}"
                          th:if="${role.name.startsWith('ROLE_')}"
                          th:text="${role.name.replace('ROLE_', '') + ' '}"></span>
        </td>
    </tr>
    </tbody>
</table>

<p>
    <a th:href="@{/users/add}">+ Добавить нового пользователя</a>
</p>

<form th:action="@{/logout}" method="post">
    <button type="submit">Выйти из системы</button>
</form>

</body>
</html>
