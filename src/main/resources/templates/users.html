<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- ВЕРХНЯЯ ПАНЕЛЬ -->
<nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid px-4">
        <span class="navbar-brand">
            <strong th:text="${#authentication.name}">admin@mail.ru</strong>
            <span class="text-secondary"> with roles: </span>
            <span class="text-secondary" th:each="authority : ${#authentication.authorities}"
                  th:text="${authority.authority.replace('ROLE_', '') + ' '}"></span>
        </span>
        <form th:action="@{/logout}" method="POST">
            <button type="submit" class="btn btn-link text-secondary text-decoration-none p-0">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">

        <!-- ЛЕВОЕ МЕНЮ -->
        <div class="col-md-2 px-0 pt-3">
            <div class="nav flex-column nav-pills" role="tablist">
                <a class="nav-link active" href="#">Admin</a>
                <a class="nav-link" th:href="@{/users/user/details}">User</a>
            </div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="col-md-10 px-4 pb-5">
            <h1 class="mb-3">Admin panel</h1>

            <!-- ВКЛАДКИ -->
            <ul class="nav nav-tabs" id="adminTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="table-tab" data-bs-toggle="tab" data-bs-target="#usersTable" type="button" role="tab">Users table</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" data-bs-target="#newUser" type="button" role="tab">New User</button>
                </li>
            </ul>

            <!-- КОНТЕНТ ВКЛАДОК -->
            <div class="tab-content border border-top-0 bg-white shadow-sm">

                <!-- 1. ВКЛАДКА: ТАБЛИЦА ПОЛЬЗОВАТЕЛЕЙ -->
                <div class="tab-pane fade show active" id="usersTable" role="tabpanel">
                    <div class="p-3 bg-light border-bottom">
                        <h5 class="mb-0">All users</h5>
                    </div>
                    <div class="p-4">
                        <table class="table table-striped align-middle">
                            <thead class="border-top">
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">2</td>
                                <td th:text="${user.firstName}">admin</td>
                                <td th:text="${user.lastName}">admin</td>
                                <td th:text="${user.age}">35</td>
                                <td th:text="${user.email}">admin@mail.ru</td>
                                <td>
                                    <span th:each="role : ${user.roles}" th:text="${role.name.replace('ROLE_', '') + ' '}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/users/edit(id=${user.id})}" class="btn btn-info btn-sm text-white px-3" style="background-color: #17a2b8; border-color: #17a2b8;">Edit</a>
                                </td>
                                <td>
                                    <form th:action="@{/users/remove}" method="POST" class="d-inline">
                                        <input type="hidden" name="id" th:value="${user.id}" />
                                        <button type="submit" class="btn btn-danger btn-sm px-2" onclick="return confirm('Вы уверены?')">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 2. ВКЛАДКА: ДОБАВЛЕНИЕ НОВОГО ПОЛЬЗОВАТЕЛЯ -->
                <div class="tab-pane fade" id="newUser" role="tabpanel">
                    <div class="p-3 bg-light border-bottom">
                        <h5 class="mb-0">Add new user</h5>
                    </div>
                    <div class="p-4">
                        <div class="col-md-4 mx-auto text-center fw-bold">
                            <!-- Убедитесь, что newUser передается в модель контроллером -->
                            <form th:action="@{/users/save}" th:object="${newUser}" method="POST">
                                <div class="mb-3">
                                    <label for="firstName" class="form-label">First name</label>
                                    <input type="text" th:field="*{firstName}" class="form-control" id="firstName" placeholder="First name" required />
                                </div>
                                <div class="mb-3">
                                    <label for="lastName" class="form-label">Last name</label>
                                    <input type="text" th:field="*{lastName}" class="form-control" id="lastName" placeholder="Last name" required />
                                </div>
                                <div class="mb-3">
                                    <label for="age" class="form-label">Age</label>
                                    <input type="number" th:field="*{age}" class="form-control" id="age" placeholder="Age" required />
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="Email" required />
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" th:field="*{password}" class="form-control" id="password" placeholder="Password" required />
                                </div>
                                <div class="mb-3">
                                    <label for="roles" class="form-label">Role</label>
                                    <select name="listRoles" id="roles" class="form-select" multiple size="2" required>
                                        <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name.replace('ROLE_', '')}">ADMIN</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-success btn-lg px-4 mt-2">Add new user</button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
