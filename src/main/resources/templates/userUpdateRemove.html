<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f9f9f9;
        }

        /* Контейнер для поля и его ошибки */
        .form-group {
            width: 350px;
            margin-bottom: 15px; /* Отступ между полями */
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-weight: bold;
            margin-right: 15px;
        }

        input {
            width: 200px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .input-error {
            border: 1px solid #d9534f;
            background-color: #fff6f6;
        }

        /* Текст ошибки теперь "расталкивает" форму, если он длинный */
        .error-message {
            display: block;
            text-align: right;
            font-size: 11px;
            color: #d9534f;
            margin-top: 4px;
            word-wrap: break-word; /* Перенос слов, если сообщение очень длинное */
        }

        button {
            width: 350px;
            padding: 10px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn-update { background-color: #e9ecef; margin-top: 5px; }
        .btn-update:hover { background-color: #dee2e6; }

        .btn-remove {
            background-color: #fff;
            color: #d9534f;
            border-color: #d9534f;
            margin-top: 10px;
        }
        .btn-remove:hover { background-color: #d9534f; color: white; }
    </style>
</head>
<body>

<h2>Редактирование пользователя</h2>

<form th:action="@{/users/update}" th:object="${user}" method="POST">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <input type="hidden" th:field="*{id}" />

    <!-- Поле: Имя -->
    <div class="form-group">
        <div class="form-row">
            <label>Имя:</label>
            <input type="text" th:field="*{firstName}"
                   th:classappend="${#fields.hasErrors('firstName')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
    </div>

    <!-- Поле: Фамилия -->
    <div class="form-group">
        <div class="form-row">
            <label>Фамилия:</label>
            <input type="text" th:field="*{lastName}"
                   th:classappend="${#fields.hasErrors('lastName')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
    </div>

    <!-- Поле: Email -->
    <div class="form-group">
        <div class="form-row">
            <label>Email:</label>
            <input type="email" th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>

    <!-- Поле: Возраст -->
    <div class="form-group">
        <div class="form-row">
            <label>Возраст:</label>
            <input type="number" th:field="*{age}"
                   th:classappend="${#fields.hasErrors('age')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></span>
    </div>

    <!-- Поле: Пароль -->
    <div class="form-group">
        <div class="form-row">
            <label>Пароль:</label>
            <input type="password" th:field="*{password}" placeholder="Новый пароль"
                   th:classappend="${#fields.hasErrors('password')} ? 'input-error' : ''" />
        </div>
        <!-- Здесь длинный текст ошибки теперь уместится полностью -->
        <span class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
    </div>

    <button type="submit" class="btn-update">Обновить пользователя</button>
</form>

<form th:action="@{/users/remove}" th:object="${user}" method="POST">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <input type="hidden" th:field="*{id}" />
    <button type="submit" class="btn-remove" onclick="return confirm('Удалить этого пользователя?')">
        Удалить пользователя
    </button>
</form>

<a th:href="@{/users}" style="margin-top: 25px; text-decoration: none; color: #007bff;">
    ← Назад к списку
</a>

</body>
</html>
