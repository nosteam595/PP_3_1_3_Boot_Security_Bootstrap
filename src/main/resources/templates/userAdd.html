<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавление пользователя</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f9f9f9;
        }

        /* Группа: поле + ошибка */
        .form-group {
            width: 350px;
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-weight: bold;
            margin-right: 10px;
        }

        input {
            width: 200px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .input-error {
            border: 1px solid #d9534f;
            background-color: #fff6f6;
        }

        /* Ошибка теперь занимает место по факту появления */
        .error-message {
            display: block;
            text-align: right;
            font-size: 11px;
            color: #d9534f;
            margin-top: 4px;
            word-wrap: break-word;
        }

        button {
            width: 350px;
            padding: 10px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

<h2>Добавление пользователя</h2>

<form th:action="@{/users/save}" th:object="${user}" method="POST">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <!-- Имя -->
    <div class="form-group">
        <div class="form-row">
            <label for="firstName">Имя:</label>
            <input type="text" th:field="*{firstName}" id="firstName"
                   th:classappend="${#fields.hasErrors('firstName')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
    </div>

    <!-- Фамилия -->
    <div class="form-group">
        <div class="form-row">
            <label for="lastName">Фамилия:</label>
            <input type="text" th:field="*{lastName}" id="lastName"
                   th:classappend="${#fields.hasErrors('lastName')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
    </div>

    <!-- Email -->
    <div class="form-group">
        <div class="form-row">
            <label for="email">Email:</label>
            <input type="email" th:field="*{email}" id="email"
                   th:classappend="${#fields.hasErrors('email')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>

    <!-- Возраст -->
    <div class="form-group">
        <div class="form-row">
            <label for="age">Возраст:</label>
            <input type="number" th:field="*{age}" id="age"
                   th:classappend="${#fields.hasErrors('age')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></span>
    </div>

    <!-- Пароль -->
    <div class="form-group">
        <div class="form-row">
            <label for="password">Пароль:</label>
            <input type="password" th:field="*{password}" id="password"
                   th:classappend="${#fields.hasErrors('password')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
    </div>

    <button type="submit">Сохранить пользователя</button>
</form>

<a th:href="@{/users}" style="margin-top: 20px; text-decoration: none; color: #007bff;">
    ← Назад к списку
</a>

</body>
</html>
