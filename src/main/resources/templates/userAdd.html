<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавление пользователя</title>
</head>
<body>

<h2>Добавление нового пользователя</h2>

<form th:action="@{/users/save}" th:object="${user}" method="POST">
    <table>
        <!-- Имя -->
        <tr>
            <td><label for="firstName">Имя:</label></td>
            <td>
                <input type="text" th:field="*{firstName}" id="firstName" required />
                <br><small th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" style="color:red"></small>
            </td>
        </tr>

        <!-- Фамилия -->
        <tr>
            <td><label for="lastName">Фамилия:</label></td>
            <td>
                <input type="text" th:field="*{lastName}" id="lastName" required />
                <br><small th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color:red"></small>
            </td>
        </tr>

        <!-- Email -->
        <tr>
            <td><label for="email">Email:</label></td>
            <td>
                <input type="email" th:field="*{email}" id="email" required />
                <br><small th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></small>
            </td>
        </tr>

        <!-- Возраст -->
        <tr>
            <td><label for="age">Возраст:</label></td>
            <td>
                <input type="number" th:field="*{age}" id="age" required />
                <br><small th:if="${#fields.hasErrors('age')}" th:errors="*{age}" style="color:red"></small>
            </td>
        </tr>

        <!-- Пароль -->
        <tr>
            <td><label for="password">Пароль:</label></td>
            <td>
                <input type="password" th:field="*{password}" id="password" required />
                <br><small th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red"></small>
            </td>
        </tr>

        <!-- Роли -->
        <tr>
            <td valign="top">Роли:</td>
            <td>
                <div th:each="role : ${allRoles}">
                    <input type="checkbox" name="listRoles"
                           th:value="${role.id}"
                           th:id="${'role_' + role.id}" />
                    <label th:for="${'role_' + role.id}" th:text="${role.name.replace('ROLE_', '')}"></label>
                </div>
            </td>
        </tr>

        <!-- Кнопка -->
        <tr>
            <td></td>
            <td>
                <br>
                <button type="submit">Сохранить пользователя</button>
            </td>
        </tr>
    </table>
</form>

<p>
    <a th:href="@{/users}">← Назад к списку</a>
</p>

</body>
</html>
